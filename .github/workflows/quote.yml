name: Update README with daily quote

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Random Quote
        id: fetch
        run: |
          RESPONSE=$(curl -sf "https://dummyjson.com/quotes/random")

          if [ -z "$RESPONSE" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          QUOTE=$(echo "$RESPONSE" | jq -r '.quote')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.author')

          if [ -z "$QUOTE" ] || [ "$QUOTE" = "null" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BLOCK=$(printf '<!-- quote start -->\n> %s\n>\n> — **%s**\n<!-- quote end -->' "$QUOTE" "$AUTHOR")

          CURRENT=$(sed -n '/<!-- quote start -->/,/<!-- quote end -->/p' README.md)

          if [ "$CURRENT" = "$BLOCK" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use awk for reliable multi-line replacement
          awk -v block="$BLOCK" '
            /<!-- quote start -->/ { in_block=1; print block; next }
            /<!-- quote end -->/   { in_block=0; next }
            !in_block              { print }
          ' README.md > README.tmp && mv README.tmp README.md

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Commit Changes
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update daily quote by ${{ steps.fetch.outputs.author }}"
          git push
